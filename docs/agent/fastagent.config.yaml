# FastAgent Configuration File

# Default Model Configuration:
#
# Takes format:
#   <provider>.<model_string>?reasoning=<value> (e.g. anthropic.claude-3-5-sonnet-20241022 or openai.o3-mini?reasoning=low)
# Accepts built-in model presets for Anthropic Models: haiku, haiku3, sonnet, sonnet35, opus, opus3
# and OpenAI Models: gpt-4o-mini, gpt-4o, o1, o1-mini, o3-mini
#
# If not specified, defaults to "haiku".
# Can be overriden with a command line switch --model=<model>, or within the Agent constructor.

default_model: gpt-5-mini

# Optional custom model references (stored under model_references using the
# exact token format $<namespace>.<key>)
# model_references:
#   system:
#     fast: gpt-5-mini?reasoning=low
#     plan: claude-sonnet-4-5
#
# You can then reference these model references in model fields, e.g.:
# default_model: $system.fast

# Logging and Console Configuration:
logger:
  # level: "debug" | "info" | "warning" | "error"
  # type: "none" | "console" | "file" | "http"
  # path: "/path/to/logfile.jsonl"

  # Switch the progress display on or off
  progress_display: true

  # Show chat User/Assistant messages on the console
  show_chat: true
  # Show tool calls on the console
  show_tools: true
  # Truncate long tool responses on the console
  truncate_tools: true

# MCP Servers
mcp:
  servers:
    filesystem:
      command: "npx"
      args:
        [
          "-y",
          "@modelcontextprotocol/server-filesystem",
          "~/source/docs-build/",
        ]
      # Optional ping settings (defaults: 30s interval, 3 missed pings)
      # ping_interval_seconds: 30
      # max_missed_pings: 3
